<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Glitch End</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

/* видео */

video{
max-width:100%;
height:auto;
}

/* мобильная версия */

@media (max-width:768px){

video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

}

/* glitch слой */

.glitch{
position:fixed;
inset:0;
background:black;
opacity:0;
pointer-events:none;
z-index:5;
}

/* endscreen */

.endscreen{
position:fixed;
inset:0;
width:100vw;
height:100vh;
object-fit:cover;
display:none;
z-index:10;
}

/* glitch animation */

@keyframes glitchFlash{

0%{opacity:0;}
20%{opacity:0.8;}
40%{opacity:0.2;}
60%{opacity:0.9;}
80%{opacity:0.3;}
100%{opacity:1;}

}

</style>
</head>

<body>

<video id="video" autoplay muted playsinline>
<source src="video/movie.mp4" type="video/mp4">
</video>

<div id="glitch" class="glitch"></div>

<img src="img/endscreen.jpg" id="end" class="endscreen">

<script>

const video = document.getElementById("video");
const glitch = document.getElementById("glitch");
const end = document.getElementById("end");

video.addEventListener("ended", function(){

glitch.style.animation = "glitchFlash 0.6s forwards";

setTimeout(()=>{

video.style.display="none";
glitch.style.display="none";
end.style.display="block";

},600);

});

</script>

</body>
</html>
